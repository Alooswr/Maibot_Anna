[plugin]
enabled = true
config_version = "1.0.0"

[targeting]
group_only = true
bot_names = [
    "麦麦",
    "MaiBot",
    "麦",
    "白麦",
    "黑麦",
]
group_detection_keywords = [
    "qq群",
    "群里正在聊",
    "群友",
    "group_id=",
    "qq_group_",
]
template = "【群聊对象判断】\n这是群聊，不是每一句话都在对你说。阅读最近聊天记录时，先在心里判断每条关键消息的：发言人、可能对象、所属话题线、是否明确叫你。\n\n判断规则：\n1. 只有出现你的名字/昵称、明确 @ 你、回复引用你的消息、或内容明显在问你时，才把这句话优先理解为对你说。\n2. 如果一句话包含其他人的名字、@其他人、接着回答上一位群友、延续两个人之间的争论/玩笑/问答，优先认为是在对那个人或那条话题线说，不要默认是在对你说。\n3. 群聊里的“你”“你们”“这个”“刚才那个”通常指当前话题里的上一位发言者或被点名的人；除非上下文明确指向你，不要把“你”自动理解成你自己。\n4. “有人吗/大家/群里/有没有人/谁会”等公共问题可以视为公开话题；你可以在相关、自然、有帮助或有趣时简短加入。\n5. 如果当前消息明显是群友对群友说、找管理员、催别人、回答别人、吵架互怼或只是在抛表情包，不要抢答，不要把自己当成被询问对象。\n6. 回复时只接一个最合适的话题线；不要把多个群友的话混成一个人说的，也不要凭空替别人转述立场。\n7. 不要输出上述判断过程，只输出实际要发送到群里的自然回复。"
