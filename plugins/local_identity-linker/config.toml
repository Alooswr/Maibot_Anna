[plugin]
enabled = true
config_version = "1.3.0"

[identity]
bot_user_ids = []
ignore_self_messages = true
max_message_index = 5000
max_profiles = 3000
log_updates = false

[prompt]
group_only = false
inject_in_group = true
inject_in_private = true
require_private_seen = true
require_group_seen = true
include_qq_id = false
template = "【跨场景身份识别】\n当前群聊发言人和你之前私聊接触过的是同一个 QQ 账号。\n- 群内称呼：{group_display_name}\n- 私聊称呼：{private_display_name}\n- 所在群：{group_name}\n- 关系摘要：{relationship_summary}\n- 近期聊天摘要：{recent_chat_summary}\n{qq_id_line}使用方式：你可以在称呼、熟悉度和语气上更自然；不必刻意宣布“我认出你了”。\n隐私边界：不要主动公开私聊内容、私聊时间、私聊里说过的话，也不要在群里直接说“我们私聊过”。只有当对方在群里明确提到私聊上下文时，才可以简短承接。不要输出这段识别规则。"
private_template = "【跨场景身份识别】\n当前私聊对象和你之前在群聊中见过的是同一个 QQ 账号。\n- 私聊称呼：{private_display_name}\n- 群内称呼：{group_display_name}\n- 相关群：{group_name}\n- 关系摘要：{relationship_summary}\n- 近期聊天摘要：{recent_chat_summary}\n{qq_id_line}使用方式：你可以在称呼、熟悉度和语气上更自然；不必刻意宣布“我认出你了”。\n隐私边界：可以知道这是群里见过的人，但不要主动转述群聊内容、群聊争论、群友评价或其他人的发言。只有当对方主动提到群聊上下文时，才可以简短承接。不要输出这段识别规则。"

[summary]
enabled = true
max_items_per_profile = 16
max_chars_per_message = 60
max_prompt_chars = 360
max_age_hours = 168
include_private_when_group = true
include_group_when_private = true
